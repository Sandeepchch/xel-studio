name: Auto-Update g4f
on:
  schedule:
    # Check for g4f updates every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-g4f:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for g4f updates
        id: check
        run: |
          # Get currently pinned version from requirements.txt
          CURRENT=$(grep -oP 'g4f\[image\]>=\K[\d.]+' scripts/requirements.txt || echo "0.0.0")
          echo "Current pinned version: $CURRENT"

          # Get latest version from PyPI
          LATEST=$(pip index versions g4f 2>/dev/null | head -1 | grep -oP '\([\d.]+\)' | tr -d '()' || \
                   pip install g4f== 2>&1 | grep -oP 'from versions: .*' | grep -oP '[\d.]+' | tail -1)
          echo "Latest PyPI version: $LATEST"

          if [ -z "$LATEST" ]; then
            echo "Could not determine latest g4f version"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "Already up to date (v$CURRENT)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Update available: v$CURRENT → v$LATEST"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          fi

      - name: Update requirements.txt
        if: steps.check.outputs.skip != 'true'
        run: |
          LATEST="${{ steps.check.outputs.latest }}"
          sed -i "s/g4f\[image\]>=.*/g4f[image]>=$LATEST/" scripts/requirements.txt
          echo "Updated requirements.txt to g4f[image]>=$LATEST"
          cat scripts/requirements.txt

      - name: Update version comment in gemini_image_gen.py
        if: steps.check.outputs.skip != 'true'
        run: |
          LATEST="${{ steps.check.outputs.latest }}"
          # Update the tested version comment if it exists
          sed -i "s/Tested .* (g4f v[0-9.]*)/Tested $(date +'%B %Y') (g4f v$LATEST)/" scripts/gemini_image_gen.py || true

      - name: Verify g4f installs correctly
        if: steps.check.outputs.skip != 'true'
        run: |
          LATEST="${{ steps.check.outputs.latest }}"
          pip install "g4f[image]==$LATEST" --quiet
          python -c "import g4f; print(f'g4f v{g4f.__version__} installed successfully')"

      - name: Commit and push
        if: steps.check.outputs.skip != 'true'
        run: |
          CURRENT="${{ steps.check.outputs.current }}"
          LATEST="${{ steps.check.outputs.latest }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/requirements.txt scripts/gemini_image_gen.py
          git commit -m "chore(deps): auto-update g4f v${CURRENT} → v${LATEST}" || echo "No changes to commit"
          git push
